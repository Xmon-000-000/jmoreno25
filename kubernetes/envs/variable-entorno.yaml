apiVersion: v1
kind: Pod
metadata:
  name: envar-demo
  labels:
    purpose: demonstrate-envars
spec:
  containers:
  - name: envar-demo-container
    image: nginx:alpine
    env:
    - name: VAR1
      value: "esta es la variable 1"
    - name: VAR2
      value: "Sahora es la variable 2"
    - name: VAR3
      value: "ahora es la variable 3"