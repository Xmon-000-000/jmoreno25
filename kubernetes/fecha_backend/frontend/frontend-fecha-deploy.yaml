apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-fecha
  labels:
    app: frontend
  annotations:
    kubernetes.io/change-cause: "frontend fecha"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx_fecha:1.3
        imagePullPolicy: IfNotPresent