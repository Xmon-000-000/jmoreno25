apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: services-ClusterRole
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: services-ClusterRoleBinding
subjects:
- kind: Group
  name: dev
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: services-ClusterRole
  apiGroup: rbac.authorization.k8s.io