apiVersion: v1
kind: Namespace
metadata:
  name: ns-jmoreno
  labels:
    env: dev
    system: linux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ns-jmoreno
  name: cm-role
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch", "list","update","patch","create"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cm-role
  namespace: ns-jmoreno
subjects:
- kind: User
  name: jmoreno
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: cm-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-role
  namespace: ns-jmoreno
  labels:
    app: front
data:
  db_host: mi_host
  db_user: usuario