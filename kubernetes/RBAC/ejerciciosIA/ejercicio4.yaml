---
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    name: payments
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: payments
  name: cm-single-reader
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["app-config"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-auditor
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sa-auditor-binding
  namespace: payments
subjects:
# You can specify more than one "subject"
- kind: ServiceAccount
  name: sa-auditor
roleRef:
  kind: Role
  name: cm-single-reader
  apiGroup: rbac.authorization.k8s.io