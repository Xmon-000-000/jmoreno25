apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: pod-rs-deploy-svc-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]

- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "watch", "list"]

- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "watch", "list"]

- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-svc-deploy-rs-pods
  namespace: default
subjects:
- kind: User
  name: jmoreno
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: pod-rs-deploy-svc-reader
  apiGroup: rbac.authorization.k8s.io