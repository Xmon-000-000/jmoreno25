---
apiVersion: v1
kind: Namespace
metadata:
  name: dev-space
  labels:
    env: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: pro-space
  labels:
    env: pro
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-dev
  labels:
    app: nginx
    env: dev
  annotations:
    kubernetes.io/change-cause: "Create in dev"
  namespace: dev-space
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        system: nginx-label
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.8-alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-pro
  labels:
    app: nginx
    env: pro
  annotations:
    kubernetes.io/change-cause: "Create in pro"
  namespace: pro-space
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        system: nginx-label
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.8-alpine