---
apiVersion: v1
kind: Namespace
metadata:
  name: space-limit
  labels:
    env: dev
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mem-cpu-limit-range
  namespace: space-limit
spec:
  limits:
  - default:
      memory: 512Mi
      cpu: 1
    defaultRequest:
      memory: 512Mi
      cpu: 1
    type: Container
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-fecha
  namespace: space-limit
  labels:
    app: backend
  annotations:
    kubernetes.io/change-cause: "backend fecha"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        system: backend-label
        env: dev
    spec:
      containers:
      - name: backend
        image: go-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: backend-fecha
  namespace: space-limit
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9090
