apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
  annotations:
    kubernetes.io/change-cause: "backend ubuntu"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        system: backend-label
        env: dev
    spec:
      containers:
      - name: backend
        image: ubuntu:latest
        command:
          - /bin/bash
          - -c
          - |
            apt update && apt install -y python3 && \
            python3 -m http.server 8080
        ports:
          - containerPort: 8080

